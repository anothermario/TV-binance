<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TV-Binance Bot{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-main: #e6edf3;
      --text-muted: #8b949e;
      --accent-color: #58a6ff;
    }
    body { background-color: var(--bg-color); color: var(--text-main); }
    .navbar { background-color: var(--card-bg) !important; border-bottom: 1px solid #30363d; }
    .navbar-brand, .nav-link { color: var(--text-main) !important; }
    .nav-link:hover, .nav-link.active { color: var(--accent-color) !important; }
    .card { background-color: var(--card-bg); border: 1px solid #30363d; }
    .card-header { background-color: #21262d; border-bottom: 1px solid #30363d; color: var(--text-main); }
    .card-body { color: var(--text-main); }
    .table { color: var(--text-main); }
    .table thead th { border-color: #30363d; color: var(--text-muted); font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
    .table tbody td { border-color: #21262d; vertical-align: middle; }
    .text-muted { color: var(--text-muted) !important; }
    .badge-open { background-color: #1f6feb; }
    .badge-closed { background-color: #238636; }
    .text-profit { color: #3fb950; }
    .text-loss { color: #f85149; }
    .stat-card .display-6 { font-weight: 700; }
    .setting-item { background-color: var(--card-bg); border: 1px solid #30363d; border-radius: .375rem; padding: 1rem; }
    .setting-label { color: var(--text-main); font-weight: 600; }
    .setting-desc { color: var(--text-muted); font-size: .875rem; }
    .setting-value { font-family: monospace; color: var(--accent-color); }
    .setting-missing { color: #f85149; font-weight: 600; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">📈 TV-Binance</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'trade-history' %}active{% endif %}" href="/dashboard">Trade History</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'stats' %}active{% endif %}" href="/stats">Stats</a></li>
          <li class="nav-item"><a class="nav-link {% if active == 'settings' %}active{% endif %}" href="/settings">Settings</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
